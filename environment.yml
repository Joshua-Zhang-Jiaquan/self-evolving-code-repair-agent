name: repair_agent
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - numpy>=1.22
  - pytorch>=2.0
  - pyyaml>=6.0
  - psutil>=5.9
  - tqdm>=4.64
  - pytest>=8.0
  - pip:
      - pydantic>=2.0
      - swebench>=2.1  # For SWE-bench Lite evaluation harness
      - transformers>=4.30  # For local model loading (Qwable-v1)
      - accelerate>=0.20   # Multi-GPU inference
      - pynvml>=11.0       # GPU monitoring
      - docker>=6.0        # SWE-bench Docker sandbox
