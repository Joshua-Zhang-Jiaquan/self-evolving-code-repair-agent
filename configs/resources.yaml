# Local hardware resource configuration for repair_agent.
# This file is the single source of truth for device allocation decisions.
# All experiments, model loads, and SWE-bench harness workers MUST read this.

device_policy: maximize_local  # "maximize_local" or "single_device" or "cpu_only"

gpus:
  expected_ids: [0, 1, 2, 3]
  # If actual count < expected, fallback_reason must be recorded per device.
  per_device:
    fallback: null       # null = use if healthy; set "memory_insufficient", "probe_failed", etc.
    min_memory_mb: 4096 # minimum free GPU memory to consider a device healthy

model_shards:
  # How to distribute model inference across available GPUs
  strategy: device_map_auto  # "device_map_auto", "tensor_parallel", "per_worker_cuda_visible_devices", "cpu_fallback"
  max_gpus_per_model: 4
  per_gpu_batch_size: 1

trainer_devices:
  # GPU assignment for REINFORCE policy training
  policy_device: 0           # GPU index for the small policy network (or "cpu")
  rollout_parallelism: 4     # max concurrent rollouts across devices
  rollout_gpus: [0, 1, 2, 3] # which GPUs are eligible for rollout worker assignment

swebench_max_workers: auto   # "auto" means probe and recommend; integer to override
  # Recommendation: CPU_count / 4, bounded by RAM per worker (~8GB min)

docker_cache_level: env      # SWE-bench --cache_level: "env" for local disk caching

cpu:
  max_workers: 32            # max concurrent CPU-intensive tasks (model loading, data prep)
  # This should not exceed ~75% of logical cores to leave headroom for Docker/SWE-bench.

memory:
  reserve_mb: 8192           # memory to reserve outside agent/SWE-bench workers (system + docker)
  per_swebench_worker_mb: 8192 # minimum memory per SWE-bench Docker evaluation worker

disk:
  cache_dir: null            # null = use default; set a path to override SWE-bench cache
  min_free_gb: 50            # warn if free space drops below this threshold during experiments

# Fallback behavior when a device is unavailable
fallback:
  on_gpu_unavailable: record_and_continue   # "record_and_continue" or "abort"
  on_gpu_oom: reduce_batch_and_retry        # "reduce_batch_and_retry", "fallback_to_cpu", or "abort"
  on_cpu_saturated: wait_and_retry          # "wait_and_retry", "reduce_workers", or "abort"
  max_retries: 3
