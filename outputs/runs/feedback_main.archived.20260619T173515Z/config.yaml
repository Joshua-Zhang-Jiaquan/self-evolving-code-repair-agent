run:
  name: feedback
  output_dir: outputs/runs

agent:
  type: feedback
  model_name_or_path: rule_based_local
  max_steps: 12
  max_test_runs: 1
  test_timeout_seconds: 10.0
  max_output_chars: 4000
  instances:
    - instance_id: feedback-local-0001
      repo: local/baseline-fixture
      problem_statement: The visible test for add_numbers fails because the helper should add two numbers.
      visible_tests:
        - tests/test_math_utils.py
      visible_failures:
        feedback-visible-failure: "AssertionError: add_numbers(2, 3) should equal 5"
      fixture:
        files:
          README.md: |
            Local feedback smoke fixture. The agent must inspect visible failure output before editing.
          math_utils.py: |
            def add_numbers(left, right):
                return left - right
          tests/test_math_utils.py: |
            from math_utils import add_numbers


            def test_add_numbers_visible():
                assert add_numbers(2, 3) == 5

dry_run:
  instances:
    - instance_id: dry-run-0001
      repo: local/dry-run
      problem_statement: Exercise logging and resume plumbing without SWE-bench or Docker.
      expected_behavior: Creates one deterministic trajectory and prediction row.
    - instance_id: dry-run-0002
      repo: local/dry-run
      problem_statement: Second local dry-run item for limit and resume tests.
      expected_behavior: Can be selected when --limit is greater than one.
